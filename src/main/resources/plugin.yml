name: Doppelgänger
version: 1.0
main: com.victorminono.doppelganger.DoppelgangerPlugin
description: Cria cópias inteligentes de jogadores com IA
api-version: 1.20
depend:
  - ProtocolLib

commands:
  doppel:
    description: Cria um Doppelgänger de um jogador
    usage: /doppel <jogador> [duração em segundos]
    permission: doppel.create
    aliases:
      - doppio
      - clone

permissions:
  doppel.create:
    description: Permite criar Doppelgängers
    default: op
